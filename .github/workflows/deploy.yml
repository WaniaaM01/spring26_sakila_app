name: Deploy Pipeline

on:
  push:
    branches: [main, feature/docker-optimization]
    paths:
      # Trigger on application code changes
      - "app.py"
      - "config.py"
      - "templates/**"
      - "static/**"
      - "Dockerfile"
      - "requirements.txt"
      - "docker-compose.yml"
    paths-ignore:
      # Do NOT trigger on documentation changes
      - "README.md"
      - "docs/**"
      - "*.md"
      - ".gitignore"

env:
  IMAGE_NAME: sakila-app

jobs:
  # ────────────────────────────────────────────────
  # Job 1: Deploy to Staging
  # ────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build staging image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:staging-${{ github.sha }} .
          echo "Built image: ${{ env.IMAGE_NAME }}:staging-${{ github.sha }}"

      - name: Simulate staging deployment
        run: |
          echo "============================================"
          echo "  DEPLOYING TO STAGING ENVIRONMENT"
          echo "============================================"
          echo "Image:       ${{ env.IMAGE_NAME }}:staging-${{ github.sha }}"
          echo "Branch:      ${{ github.ref_name }}"
          echo "Commit:      ${{ github.sha }}"
          echo "Actor:       ${{ github.actor }}"
          echo "Timestamp:   $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "Starting staging container..."
          docker run -d \
            --name staging-app \
            -p 5000:5000 \
            -e MYSQL_HOST=staging-db \
            -e MYSQL_DB=sakila \
            ${{ env.IMAGE_NAME }}:staging-${{ github.sha }} || true
          echo "Staging deployment simulation complete."

      - name: Write Job Summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | Staging |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.IMAGE_NAME }}:staging-${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Staging URL" >> $GITHUB_STEP_SUMMARY
          echo "http://staging.sakila-app.example.com:5000" >> $GITHUB_STEP_SUMMARY

      - name: Notify — Staging deployment
        run: |
          echo "📣 Slack notification: Deployment to staging successful!"
          echo "   Commit: ${{ github.sha }}"
          echo "   Actor:  ${{ github.actor }}"

  # ────────────────────────────────────────────────
  # Job 2: Deploy to Production (requires approval)
  # ────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production      # Requires manual approval in GitHub environment settings

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:production-${{ github.sha }} .
          docker build -t ${{ env.IMAGE_NAME }}:latest .
          echo "Built production image: ${{ env.IMAGE_NAME }}:production-${{ github.sha }}"

      - name: Simulate production deployment
        run: |
          echo "============================================"
          echo "  DEPLOYING TO PRODUCTION ENVIRONMENT"
          echo "============================================"
          echo "Image:       ${{ env.IMAGE_NAME }}:production-${{ github.sha }}"
          echo "Branch:      ${{ github.ref_name }}"
          echo "Commit:      ${{ github.sha }}"
          echo "Actor:       ${{ github.actor }}"
          echo "Timestamp:   $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "Production deployment simulation complete."
          echo "✅ Application is live in production!"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const tag = `v${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
            const name = `Release ${tag}`;

            try {
              const release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                tag_name: tag,
                name: name,
                body: `## What's Changed\n\n- Automated production release\n- Commit: \`${{ github.sha }}\`\n- Deployed by: @${{ github.actor }}\n- Timestamp: ${now.toISOString()}`,
                draft: false,
                prerelease: false,
              });
              console.log(`Created release: ${release.data.html_url}`);
            } catch (e) {
              // If tag already exists (same-day deploy), update it
              console.log(`Could not create release with tag ${tag}: ${e.message}`);
              console.log('Skipping release creation (tag may already exist for today).');
            }

      - name: Notify — Production deployment
        run: |
          echo "📣 Slack notification: Deployment to production successful!"
          echo "   Commit: ${{ github.sha }}"
          echo "   Actor:  ${{ github.actor }}"
          echo "   🎉 Production is live!"
